<div class="bg-background font-body-md text-on-background min-h-screen">
  <!-- TopNavBar -->
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-margin-desktop h-16 bg-surface/95 backdrop-blur-sm border-b border-outline-variant">
    <div class="flex items-center gap-8">
      <span class="text-headline-md font-headline-md font-bold text-primary">CampusSync UnACh</span>
      <nav class="hidden md:flex items-center gap-6" *ngIf="user">
        <ng-container *ngIf="user.role === 'Admin'">
          <a routerLink="/admin" class="text-secondary hover:text-primary transition-colors text-label-sm font-label-sm">Actividades</a>
          <a routerLink="/admin/usuarios" class="text-secondary hover:text-primary transition-colors text-label-sm font-label-sm">Usuarios</a>
          <a routerLink="/admin/reportes" class="text-secondary hover:text-primary transition-colors text-label-sm font-label-sm">Reportes</a>
        </ng-container>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <ng-container *ngIf="user">
        <div class="relative hidden sm:block">
          <input class="bg-surface-container-low border border-outline-variant rounded-full px-4 py-1.5 text-label-sm w-64 focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Buscar..." type="text"/>
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary scale-75">search</span>
        </div>
        <button (click)="logout()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-variant/30 text-primary hover:bg-surface-variant/50 transition-all text-label-sm font-label-sm">
          Cerrar Sesión
          <span class="material-symbols-outlined text-[18px]">logout</span>
        </button>
        <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white font-bold overflow-hidden border-2 border-white shadow-sm">
          <span class="material-symbols-outlined">person</span>
        </div>
      </ng-container>
      <ng-container *ngIf="!user">
        <a routerLink="/login" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary/90 transition-all text-label-sm font-label-sm">
          Ingresar
        </a>
      </ng-container>
    </div>
  </header>

  <!-- SideNavBar (Hidden on Mobile) -->
  <aside *ngIf="user" class="hidden lg:flex flex-col h-screen fixed left-0 top-0 pt-20 p-4 w-64 bg-surface-container-low border-r border-outline-variant z-40">
    <div class="mb-8 px-4">
      <h2 class="text-headline-md font-headline-md font-extrabold text-primary">Portal Académico</h2>
      <p class="text-label-sm font-label-sm text-secondary opacity-70">CampusSync v2.0</p>
    </div>
    <nav class="space-y-2 flex-grow">
      <!-- Admin links -->
      <ng-container *ngIf="user.role === 'Admin'">
        <a routerLink="/admin" routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all text-label-sm font-label-sm">
          <span class="material-symbols-outlined">explore</span>
          <span>Panel Principal</span>
        </a>
        <a routerLink="/admin/usuarios" routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all text-label-sm font-label-sm">
          <span class="material-symbols-outlined">group</span>
          <span>Usuarios</span>
        </a>
        <a routerLink="/admin/reportes" routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all text-label-sm font-label-sm">
          <span class="material-symbols-outlined">analytics</span>
          <span>Reportes IA</span>
        </a>
      </ng-container>

      <!-- Alumno links -->
      <ng-container *ngIf="user.role === 'Alumno'">
        <a routerLink="/alumno" routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all text-label-sm font-label-sm">
          <span class="material-symbols-outlined">explore</span>
          <span>Explorar</span>
        </a>
        <a routerLink="/alumno/mis-inscripciones" routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all text-label-sm font-label-sm">
          <span class="material-symbols-outlined">assignment_turned_in</span>
          <span>Mis Inscripciones</span>
        </a>
      </ng-container>
    </nav>
  </aside>

  <!-- Main Content Canvas -->
  <main [class.lg:ml-64]="user" class="pt-24 pb-12 px-4 md:px-margin-desktop min-h-screen">
    <router-outlet></router-outlet>
  </main>
</div>
