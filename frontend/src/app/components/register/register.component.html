<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden md:max-w-md mt-16 mb-16">
  <div class="p-10">
    <div class="flex justify-center mb-6">
      <div class="bg-indigo-100 p-3 rounded-2xl">
        <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>
    </div>
    <div class="text-center mb-8">
      <div class="uppercase tracking-wider text-xs text-indigo-600 font-bold mb-2">
        Crear Cuenta
      </div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">
        Únete a CampusSync
      </h2>
      <p class="text-gray-500 text-sm mt-2">Crea tu cuenta para empezar</p>
    </div>
    
    <div *ngIf="errorMessage" class="bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-medium border border-red-100 flex items-center gap-2 mb-6">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="bg-green-50 text-green-600 px-4 py-3 rounded-xl text-sm font-medium border border-green-100 flex items-center gap-2 mb-6">
      <span>{{ successMessage }}</span>
    </div>

    <form class="space-y-5" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
          Nombre Completo
        </label>
        <input class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" 
               id="name" type="text" placeholder="Ej: Juan Pérez" [(ngModel)]="formData.name" name="name" required>
      </div>

      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="email">
          Correo Electrónico
        </label>
        <input class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" 
               id="email" type="email" placeholder="correo@ejemplo.com" [(ngModel)]="formData.email" name="email" required>
      </div>

      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
          Contraseña
        </label>
        <input class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" 
               id="password" type="password" placeholder="••••••••" [(ngModel)]="formData.password" name="password" required>
      </div>

      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="role">
          Rol de usuario
        </label>
        <div class="relative">
          <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors appearance-none" 
                  id="role" [(ngModel)]="formData.role" name="role">
            <option value="Alumno">Estudiante / Alumno</option>
            <option value="Admin">Administrador</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
          </div>
        </div>
      </div>

      <div class="pt-2">
        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md hover:shadow-lg focus:ring-4 focus:ring-indigo-200" 
                type="submit">
          Registrarse
        </button>
      </div>
    </form>
    
    <div class="mt-8 text-center border-t border-gray-100 pt-6">
      <p class="text-sm text-gray-600">
        ¿Ya tienes una cuenta?
        <a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-800 transition-colors ml-1">
          Inicia sesión
        </a>
      </p>
    </div>
  </div>
</div>
