<div class="p-8 max-w-7xl mx-auto min-h-screen bg-gray-50">
  <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100 flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Portal del Alumno</h2>
      <p class="text-gray-500 mt-1 text-sm">Bienvenido, {{ user?.name }}</p>
    </div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-medium border border-red-100 flex items-center gap-2 mb-6">
    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <span>{{ errorMessage }}</span>
  </div>

  <div *ngIf="successMessage" class="bg-green-50 text-green-600 px-4 py-3 rounded-xl text-sm font-medium border border-green-100 flex items-center gap-2 mb-6">
    <span>{{ successMessage }}</span>
  </div>

  <div class="mb-6 flex items-center gap-2">
    <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
    <h3 class="text-2xl font-bold text-gray-900">Actividades Disponibles</h3>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let act of activities" class="bg-white p-6 border border-gray-100 rounded-2xl shadow-sm hover:shadow-lg transition-all flex flex-col h-full group">
      <h4 class="font-bold text-xl mb-3 text-gray-900 group-hover:text-indigo-600 transition-colors">{{ act.title }}</h4>
      <p class="text-gray-500 text-sm mb-6 flex-grow leading-relaxed">{{ act.description }}</p>
      <button (click)="enroll(act.id)" class="w-full bg-indigo-50 text-indigo-700 border border-indigo-100 px-4 py-3 rounded-xl font-bold hover:bg-indigo-600 hover:text-white transition-all shadow-sm focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 mt-auto">
        Inscribirme
      </button>
    </div>
    
    <div *ngIf="activities.length === 0" class="col-span-full p-12 text-center flex flex-col items-center justify-center text-gray-500 bg-white rounded-2xl border border-gray-100 shadow-sm min-h-[300px]">
      <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
      <p class="text-lg font-medium">Aún no hay actividades publicadas</p>
      <p class="text-sm mt-1">Vuelve más tarde para descubrir nuevos eventos de la universidad.</p>
    </div>
  </div>
</div>
