<div class="max-w-md mx-auto bg-surface-container-lowest rounded-xl shadow-[0_4px_6px_-1px_rgb(0,0,0,0.05)] border border-outline-variant overflow-hidden md:max-w-md mt-16 mb-16">
  <div class="p-10">
    <div class="flex justify-center mb-6">
      <div class="bg-primary-container p-3 rounded-2xl text-on-primary-container">
        <span class="material-symbols-outlined text-4xl">lock</span>
      </div>
    </div>
    <div class="text-center mb-8">
      <div class="uppercase tracking-wider text-label-sm font-label-sm text-primary font-bold mb-2">
        Iniciar Sesión
      </div>
      <h2 class="text-headline-xl font-headline-xl text-on-surface tracking-tight">
        Bienvenido a CampusSync
      </h2>
      <p class="text-body-md font-body-md text-secondary mt-2">Accede a tus actividades y más</p>
    </div>
    
    <div *ngIf="errorMessage" class="bg-error-container/30 text-error px-4 py-3 rounded-xl text-label-sm font-label-sm border border-error/20 flex items-center gap-2 mb-6">
      <span class="material-symbols-outlined">error</span>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="bg-tertiary-container/30 text-tertiary px-4 py-3 rounded-xl text-label-sm font-label-sm border border-tertiary/20 flex items-center gap-2 mb-6">
      <span class="material-symbols-outlined">check_circle</span>
      <span>{{ successMessage }}</span>
    </div>

    <form class="space-y-5" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-secondary text-label-sm font-label-sm mb-2" for="email">
          Correo Electrónico
        </label>
        <input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-body-md font-body-md outline-none" 
               id="email" type="email" placeholder="correo@ejemplo.com" [(ngModel)]="formData.email" name="email" required>
      </div>

      <div>
        <label class="block text-secondary text-label-sm font-label-sm mb-2" for="password">
          Contraseña
        </label>
        <input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-body-md font-body-md outline-none" 
               id="password" type="password" placeholder="••••••••" [(ngModel)]="formData.password" name="password" required>
      </div>

      <div class="pt-2">
        <button class="w-full bg-primary text-white font-bold py-3 px-4 rounded-xl transition-all shadow-sm hover:shadow-md focus:ring-4 focus:ring-primary/20 text-label-sm font-label-sm active:scale-95" 
                type="submit">
          Ingresar
        </button>
      </div>
    </form>
    
    <div class="mt-8 text-center border-t border-outline-variant pt-6">
      <p class="text-body-md font-body-md text-secondary">
        ¿No tienes una cuenta?
        <a routerLink="/register" class="font-bold text-primary hover:text-primary/80 transition-colors ml-1">
          Regístrate aquí
        </a>
      </p>
    </div>
  </div>
</div>
