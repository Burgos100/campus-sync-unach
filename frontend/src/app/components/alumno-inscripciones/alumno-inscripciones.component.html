<div class="p-8 max-w-7xl mx-auto min-h-screen bg-gray-50">
  <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100 flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Mis Inscripciones</h2>
      <p class="text-gray-500 mt-2 text-sm">Revisa el estado de tus actividades y tu registro de asistencia.</p>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-12">
    <p class="text-gray-500">Cargando tus inscripciones...</p>
  </div>

  <div *ngIf="!loading && error" class="bg-red-50 text-red-600 p-4 rounded-xl mb-6">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && inscripciones.length === 0" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center flex flex-col items-center justify-center">
    <div class="bg-emerald-50 p-4 rounded-full mb-6">
      <svg class="w-12 h-12 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
    </div>
    <h3 class="text-xl font-bold text-gray-900 mb-2">No tienes inscripciones</h3>
    <p class="text-gray-500">Aún no te has inscrito en ninguna actividad.</p>
  </div>

  <div *ngIf="!loading && !error && inscripciones.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let item of inscripciones" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
      <div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">{{ item.title }}</h3>
        <p class="text-gray-600 text-sm mb-4 line-clamp-3">{{ item.description }}</p>
      </div>
      <div class="pt-4 border-t border-gray-100 flex items-center justify-between">
        <span class="text-sm font-medium text-gray-500">Asistencia:</span>
        <span *ngIf="item.attended" class="px-3 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded-full">Presente</span>
        <span *ngIf="!item.attended" class="px-3 py-1 bg-yellow-100 text-yellow-700 text-xs font-semibold rounded-full">Pendiente / Ausente</span>
      </div>
    </div>
  </div>
</div>
