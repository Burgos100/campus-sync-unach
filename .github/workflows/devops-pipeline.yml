name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create .env file using GitHub Secrets
        run: |
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          # También proveemos las variables al entorno del backend
          cp .env backend/.env

      # ---- Backend Pasos ----
      - name: Install Dependencies (Backend)
        run: cd backend && npm ci || npm install

      - name: Lint Backend (ESLint)
        run: cd backend && npm run lint

      - name: Test Backend
        run: cd backend && npm run test
        env:
          # Uso de GitHub Secrets para variables sensibles (Requisito de la rúbrica)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_HOST: localhost
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}

      # ---- Frontend Pasos ----
      - name: Install Dependencies (Frontend)
        run: cd frontend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      # ---- Docker Build ----
      - name: Build Docker Compose
        run: docker-compose build
